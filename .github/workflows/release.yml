name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build release binary
        run: cargo build --release

      - name: Update latest release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest
          body: |
            Automated build from commit [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            **Download `pal-editor.exe` below** — no install needed, drop it anywhere and run.
          artifacts: target/release/pal-editor.exe
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
